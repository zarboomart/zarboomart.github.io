<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>پنل مدیریت | ZarBoom ART</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">
<h1>ZarBoom ART</h1>
</div>

</header>

<section>

<h2 class="title">

پنل مدیریت

</h2>

<div class="dashboard-box">

<h3>✏️ مدیریت قیمت کلاس‌ها</h3>

<input type="text" placeholder="قیمت کلاس سیاه‌قلم">

<input type="text" placeholder="قیمت کلاس نقاشی">

<button class="btn">

ذخیره قیمت

</button>

</div>

<div class="dashboard-box">

<h3>🖼️ مدیریت تصاویر</h3>

<input type="file">

<button class="btn">

آپلود تصویر

</button>

</div>

<div class="dashboard-box">

<h3>📝 ویرایش متن سایت</h3>

<textarea rows="6" placeholder="متن جدید سایت"></textarea>

<button class="btn">

ذخیره متن

</button>

</div>

<div class="dashboard-box">

<h3>📅 تاریخ و ساعت کلاس</h3>

<input type="date">

<input type="time">

<button class="btn">

ثبت

</button>

</div>

<div class="dashboard-box">

<h3>👥 ثبت‌نام هنرجویان</h3>

<table>

<tr>

<th>نام</th>

<th>شماره</th>

<th>کلاس</th>

</tr>

<tr>

<td>نمونه</td>

<td>09123456789</td>

<td>سیاه‌قلم</td>

</tr>

</table>

</div>

<div class="dashboard-box">

<h3>🎁 تخفیف</h3>

<input type="text" placeholder="درصد تخفیف">

<button class="btn">

اعمال تخفیف

</button>

</div>

<div class="dashboard-box">

<h3>🚪 خروج</h3>

<a href="index.html" class="btn">

بازگشت به سایت

</a>

</div>

</section>

<script src="app.js"></script>

</body>

</html>
